name: Backend CI

on:
    push:
        branches: [main]
        paths:
            - 'backend/**'
            - '.github/workflows/backend-ci.yml'
    pull_request:
        branches: [main]
        paths:
            - 'backend/**'
            - '.github/workflows/backend-ci.yml'

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                    python-version: '3.12'
                    cache: 'pip'
            - run: pip install -r requirements.txt
            - run: python -m py_compile app.py evaluation.py ai/minimax.py ai/online_ai.py game/board.py tests/test_socket_game.py
            - run: python -m unittests discover -s tests
